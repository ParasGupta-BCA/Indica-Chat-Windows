<!DOCTYPE html>
<html>
<head>
  <style>
    body {
      margin: 0;
      padding: 0;
      background-color: #000000;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      width: 100vw;
      overflow: hidden;
      -webkit-app-region: drag;
    }
    .logo-container {
      position: relative;
      width: 100%;
      max-width: none;
      display: flex;
      flex-direction: column;
      align-items: center;
      animation: fadeIn 0.8s ease-out;
    }
    img {
      width: 100%;
      height: auto;
      object-fit: contain;
    }
    .loader {
      position: absolute;
      bottom: 0;
      left: 0;
      width: 100%;
      height: 2px;
      background: rgba(255, 255, 255, 0.05);
      overflow: hidden;
      z-index: 10;
    }
    .loader-bar {
      width: 40%;
      height: 100%;
      background: linear-gradient(90deg, transparent, #3b82f6, #60a5fa, #3b82f6, transparent);
      position: absolute;
      animation: loading 2s infinite ease-in-out;
      box-shadow: 0 0 15px rgba(59, 130, 246, 0.8);
    }
    @keyframes loading {
      0% { left: -40%; }
      100% { left: 100%; }
    }
    @keyframes fadeIn {
      from { opacity: 0; transform: scale(0.95); }
      to { opacity: 1; transform: scale(1); }
    }
  </style>
</head>
<body>
  <div class="logo-container">
    <img src="../logo_image/SplashScreen_Logo.png" alt="Indica Chat Logo">
  </div>
  <div class="loader">
    <div class="loader-bar"></div>
  </div>
</body>
</html>
